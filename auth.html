<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Register | Ormidia Car Accessories</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="components.js"></script>
    <style>
        .auth-section {
            padding: 8rem 2rem 5rem;
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-container {
            max-width: 1100px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            overflow: hidden;
            width: 100%;
        }
        .auth-card {
            padding: 3rem;
        }
        .auth-header {
            margin-bottom: 2rem;
        }
        .auth-header h1 {
            font-size: 2rem;
            color: #1e293b;
            margin-bottom: 0.5rem;
        }
        .auth-header p {
            color: #64748b;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            font-size: 0.9rem;
            color: #1e293b;
        }
        .form-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
        }
        .form-group input:focus {
            outline: none;
            border-color: #E30613;
            box-shadow: 0 0 0 3px rgba(227, 6, 19, 0.1);
        }
        .password-input-wrapper {
            position: relative;
        }
        .password-input-wrapper input {
            padding-right: 3rem;
        }
        .password-toggle {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #999;
            cursor: pointer;
            font-size: 1.1rem;
        }
        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }
        .btn-primary {
            background: #E30613;
            color: white;
            width: 100%;
            padding: 0.9rem;
            font-size: 1.1rem;
        }
        .btn-primary:hover {
            background: #b80510;
        }
        .auth-switch {
            text-align: center;
            margin-top: 1.5rem;
            color: #64748b;
        }
        .auth-switch a {
            color: #E30613;
            text-decoration: none;
            font-weight: 600;
        }
        .auth-info {
            background: linear-gradient(135deg, #E30613, #c0392b);
            color: white;
            padding: 3rem;
            display: flex;
            align-items: center;
        }
        .auth-info-content h2 {
            font-size: 2rem;
            margin-bottom: 1.5rem;
        }
        .auth-info-content ul {
            list-style: none;
            padding: 0;
        }
        .auth-info-content ul li {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.5rem 0;
            opacity: 0.95;
        }
        .already-logged-in {
            text-align: center;
            padding: 1.5rem;
            background: #dcfce7;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            border: 1px solid #22c55e;
        }
        .already-logged-in .btn-group {
            margin-top: 1rem;
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        @media (max-width: 768px) {
            .auth-container {
                grid-template-columns: 1fr;
            }
            .auth-card {
                padding: 2rem;
            }
            .auth-info {
                padding: 2rem;
                order: -1;
            }
            .auth-section {
                padding: 6rem 1rem 3rem;
            }
        }
    </style>
</head>
<body>
    <!-- Global Header -->
    <div id="header-placeholder"></div>

    <!-- Auth Content -->
    <section class="auth-section">
        <div class="container">
            <div class="auth-container">
                <div class="auth-card">
                    <div class="auth-header">
                        <h1 id="auth-title">Welcome Back</h1>
                        <p id="auth-subtitle">Sign in to your account to continue</p>
                    </div>

                    <div id="alreadyLoggedIn" class="already-logged-in" style="display: none;">
                        <i class="fas fa-check-circle"></i>
                        <span>You are already logged in as <strong id="loggedInUserName"></strong></span>
                        <div class="btn-group">
                            <button class="btn" style="background:#e74c3c;color:white;" onclick="handleLogout()">

                            </button>
                            <button class="btn" style="background:#E30613;color:white;" onclick="goToDashboard()">
                                <i class="fas fa-arrow-right"></i> Go to Dashboard
                            </button>
                        </div>
                    </div>

                    <form id="login-form">
                        <div class="form-group">

                            <input type="email" id="login-email" placeholder="Enter your email" required>

                            <label>Password</label>

                                <input type="password" id="login-password" placeholder="Enter your password" required>

                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary">Sign In</button>
                        <p class="auth-switch">
                            Don't have an account? <a href="#" onclick="switchToRegister()">Sign Up</a>
                        </p>
                    </form>

                    <form id="register-form" style="display: none;">
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" id="register-name" placeholder="Enter your full name" required>
                        </div>
                        <div class="form-group">
                            <label>Email Address</label>
                            <input type="email" id="register-email" placeholder="Enter your email" required>

                            <label>Password</label>
                            <div class="password-input-wrapper">
                                <input type="password" id="register-password" placeholder="Create a password" required minlength="6">
                                <button type="button" class="password-toggle" onclick="togglePassword('register-password')">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>

                            <div class="password-input-wrapper">
                                <input type="password
