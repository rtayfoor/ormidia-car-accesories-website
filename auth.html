<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Ormidia Car Accessories</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <!-- ... your auth page HTML ... -->
    <script>
        // Supabase Configuration
        const SUPABASE_URL = 'https://gyeyxvfwhsbbhnjwlgbx.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_nSWYIf67QX6O78By4H3SMQ_YCi28s1S';
        
        const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // Login function
        async function loginWithEmail(email, password) {
            try {
                const { data, error } = await _supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                if (error) throw error;
                
                // Store user data with the actual UUID
                const userData = {
                    id: data.user.id,  // This is the actual UUID from Supabase
                    email: data.user.email,
                    name: data.user.user_metadata?.name || data.user.email?.split('@')[0] || 'User'
                };
                
                localStorage.setItem('user', JSON.stringify(userData));
                localStorage.setItem('supabase_session', JSON.stringify(data.session));
                
                return { success: true, user: userData };
            } catch (error) {
                console.error('Login error:', error);
                return { success: false, error: error.message };
            }
        }
        
        // Register function
        async function registerWithEmail(email, password, name) {
            try {
                const { data, error } = await _supabase.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: {
                            name: name
                        }
                    }
                });
                
                if (error) throw error;
                
                // Store user data with the actual UUID
                const userData = {
                    id: data.user.id,  // This is the actual UUID from Supabase
                    email: data.user.email,
                    name: name || data.user.email?.split('@')[0] || 'User'
                };
                
                localStorage.setItem('user', JSON.stringify(userData));
                localStorage.setItem('supabase_session', JSON.stringify(data.session));
                
                return { success: true, user: userData };
            } catch (error) {
                console.error('Registration error:', error);
                return { success: false, error: error.message };
            }
        }
        
        // Check if user is already logged in
        function checkAuth() {
            const user = JSON.parse(localStorage.getItem('user'));
            const session = JSON.parse(localStorage.getItem('supabase_session'));
            
            if (user && session) {
                // Verify session is still valid
                _supabase.auth.getUser().then(({ data, error }) => {
                    if (error || !data.user) {
                        // Session expired, clear local storage
                        localStorage.removeItem('user');
                        localStorage.removeItem('supabase_session');
                        window.location.href = 'auth.html';
                    }
                });
                return user;
            }
            return null;
        }
        
        // Logout function
        async function logout() {
            try {
                await _supabase.auth.signOut();
                localStorage.removeItem('user');
                localStorage.removeItem('supabase_session');
                return { success: true };
            } catch (error) {
                console.error('Logout error:', error);
                return { success: false, error: error.message };
            }
        }
        
        // ... rest of your auth page code
    </script>
</body>
</html>
