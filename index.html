<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Products | Ormidia Car Accessories</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="components.js"></script>
    <style>
        .page-header {
            padding: 8rem 0 2rem;
            background: linear-gradient(135deg, #fef5f5 0%, #fff 100%);
            text-align: center;
        }
        .page-header h1 {
            font-size: 2.5rem;
            color: #1e293b;
        }
        .page-header p {
            color: #64748b;
            margin-top: 0.5rem;
        }
        .products-page {
            padding: 2rem 0 4rem;
        }
        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
            align-items: center;
        }
        .filter-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .filter-select {
            padding: 0.5rem 1rem;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            background: white;
            font-family: inherit;
        }
        .search-box {
            display: flex;
            align-items: center;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 0.25rem 0.5rem;
            flex: 1;
            min-width: 200px;
        }
        .search-box input {
            border: none;
            padding: 0.5rem;
            flex: 1;
            font-family: inherit;
        }
        .search-box input:focus {
            outline: none;
        }
        .search-box i {
            color: #94a3b8;
            padding: 0.5rem;
        }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1.5rem;
        }
        .product-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
        }
        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.12);
        }
        .product-image {
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f8fafc;
            position: relative;
        }
        .product-image img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        .stock-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .stock-badge.in-stock { color: #22c55e; }
        .stock-badge.low-stock { color: #f59e0b; }
        .stock-badge.out-of-stock { color: #E30613; }
        .product-info {
            padding: 1rem;
        }
        .product-brand {
            font-size: 0.75rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .product-title {
            font-size: 1rem;
            font-weight: 600;
            margin: 0.25rem 0;
            color: #1e293b;
        }
        .product-price {
            font-size: 1.25rem;
            font-weight: 700;
            color: #E30613;
            margin: 0.5rem 0;
        }
        .add-to-cart {
            width: 100%;
            padding: 0.75rem;
            background: #E30613;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s ease;
            margin-top: 0.5rem;
        }
        .add-to-cart:hover:not(:disabled) {
            background: #b80510;
        }
        .add-to-cart:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .loading-spinner {
            text-align: center;
            padding: 4rem;
            grid-column: 1/-1;
        }
        .loading-spinner i {
            font-size: 3rem;
            color: #E30613;
            margin-bottom: 1rem;
        }
        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }
        .btn-primary {
            background: #E30613;
            color: white;
        }
        .btn-primary:hover {
            background: #b80510;
        }
        @media (max-width: 768px) {
            .filter-bar {
                flex-direction: column;
                align-items: stretch;
            }
            .products-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            }
        }
    </style>
</head>
<body>
    <!-- Global Header -->
    <div id="header-placeholder"></div>

    <!-- Page Content -->
    <section class="page-header">
        <div class="container">
            <h1>All Products</h1>
            <p>Browse our complete collection of premium car accessories</p>
        </div>
    </section>

    <section class="products-page">
        <div class="container">
            <div class="filter-bar">
                <div class="filter-group">
                    <label for="category-filter">Category:</label>
                    <select id="category-filter" class="filter-select">
                        <option value="all">All Products</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="sort-filter">Sort by:</label>
                    <select id="sort-filter" class="filter-select">
                        <option value="name">Name</option>
                        <option value="price_low">Price: Low to High</option>
                        <option value="price_high">Price: High to Low</option>
                    </select>
                </div>
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="Search products...">
                    <i class="fas fa-search"></i>
                </div>
            </div>

            <div class="loading-spinner" id="loading-spinner">
                <i class="fas fa-spinner fa-spin"></i>
                <p>Loading products...</p>
            </div>
            <div class="products-grid" id="all-products"></div>
        </div>
    </section>

    <!-- Global Footer -->
    <div id="footer-placeholder"></div>

    <script>
        // Your products page JavaScript here
        // Note: components.js already includes the header/footer initialization
        // Add your product loading logic here
    </script>
</body>
</html>
