<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Products | Ormidia Car Accessories</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* ... (keep your existing styles) ... */
        .stock-status {
            font-size: 0.85rem;
            margin: 0.5rem 0;
            padding: 0.3rem 0.6rem;
            border-radius: 4px;
            display: inline-block;
        }
        .in-stock { color: #27ae60; }
        .low-stock { color: #f39c12; }
        .out-of-stock { color: #e74c3c; }
        .reserved-badge {
            background: #3498db;
            color: white;
            font-size: 0.7rem;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            margin-left: 0.5rem;
        }
        .timer-badge {
            background: #e67e22;
            color: white;
            font-size: 0.7rem;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            margin-left: 0.5rem;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .stock-info {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
    <!-- ... (keep your existing HTML structure) ... -->

    <script>
        (function() {
            const SUPABASE_URL = 'https://gyeyxvfwhsbbhnjwlgbx.supabase.co';
            const SUPABASE_ANON_KEY = 'sb_publishable_nSWYIf67QX6O78By4H3SMQ_YCi28s1S';
            
            const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            
            let allProducts = [];
            let currentProducts = [];
            let productCategories = new Set();
            let productsData = {};
            let currentModalProduct = null;
            let currentModalVariants = [];
            let cartId = localStorage.getItem('cartId') || generateCartId();
            
            // Generate a unique cart ID if not exists
            function generateCartId() {
                const id = 'cart_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                localStorage.setItem('cartId', id);
                return id;
            }
            
            // Get cart from localStorage
            function getCart() {
                return JSON.parse(localStorage.getItem('cart')) || [];
            }
            
            // Save cart to localStorage
            function saveCart(cart) {
                localStorage.setItem('cart', JSON.stringify(cart));
            }
            
            // Complete image mapping (keep your existing function)
            function getProductImageUrl(productName, variantName = null) {
                // ... (keep your existing image mapping code)
            }
            
            // Fetch products with variants and stock
            async function fetchProducts() {
                try {
                    showLoading(true);
                    
                    // Use the view to get products with variants
                    const { data: products, error: productsError } = await _supabase
                        .from('products_with_variants')
                        .select('*')
                        .order('id', { ascending: true });
                    
                    if (productsError) throw productsError;
                    
                    // Fetch stock availability for each product
                    const stockPromises = products.map(async (product) => {
                        const stockData = await getProductStock(product.id);
                        return {
                            ...product,
                            available_stock: stockData
                        };
                    });
                    
                    const productsWithStock = await Promise.all(stockPromises);
                    
                    productsWithStock.forEach(product => {
                        productsData[product.id] = product;
                        productCategories.add(product.name);
                    });
                    
                    allProducts = productsWithStock.map(product => ({
                        id: product.id,
                        name: product.name,
                        description: product.description,
                        base_price: product.base_price,
                        category: product.name,
                        hasVariants: product.variants && product.variants.length > 0,
                        variantCount: product.variants ? product.variants.length : 0,
                        available_stock: product.available_stock
                    }));
                    
                    currentProducts = [...allProducts];
                    displayProducts(currentProducts);
                    populateCategoryFilter();
                    
                } catch (error) {
                    console.error('Error:', error);
                    showError('Failed to load products');
                } finally {
                    showLoading(false);
                }
            }
            
            // Get product stock
            async function getProductStock(productId) {
                try {
                    const { data, error } = await _supabase
                        .rpc('get_product_available_stock', {
                            p_product_id: productId,
                            p_cart_id: cartId
                        });
                    
                    if (error) throw error;
                    return data || 0;
                } catch (error) {
                    console.error('Error getting stock:', error);
                    return 0;
                }
            }
            
            // Get variant stock
            async function getVariantStock(variantId) {
                try {
                    const { data, error } = await _supabase
                        .rpc('get_available_stock', {
                            p_variant_id: variantId,
                            p_cart_id: cartId
                        });
                    
                    if (error) throw error;
                    return data || 0;
                } catch (error) {
                    console.error('Error getting variant stock:', error);
                    return 0;
                }
            }
            
            // Reserve stock when adding to cart
            async function reserveStock(productId, variantId = null, quantity = 1) {
                try {
                    const { data, error } = await _supabase
                        .rpc('reserve_stock', {
                            p_cart_id: cartId,
                            p_product_id: productId,
                            p_variant_id: variantId,
                            p_quantity: quantity
                        });
                    
                    if (error) throw error;
                    return data;
                } catch (error) {
                    console.error('Error reserving stock:', error);
                    return false;
                }
            }
            
            // Release stock when removing from cart
            async function releaseStock(productId, variantId = null) {
                try {
                    const { error } = await _supabase
                        .rpc('release_stock', {
                            p_cart_id: cartId,
                            p_product_id: productId,
                            p_variant_id: variantId
                        });
                    
                    if (error) throw error;
                    return true;
                } catch (error) {
                    console.error('Error releasing stock:', error);
                    return false;
                }
            }
            
            // Process checkout
            async function processCheckout(items) {
                try {
                    const { data, error } = await _supabase
                        .rpc('process_checkout', {
                            p_cart_id: cartId,
                            p_items: items
                        });
                    
                    if (error) throw error;
                    return data;
                } catch (error) {
                    console.error('Error processing checkout:', error);
                    throw error;
                }
            }
            
            function displayProducts(products) {
                const container = document.getElementById('all-products');
                const noResults = document.getElementById('no-results');
                const productsCount = document.getElementById('products-count');
                
                if (!container) return;
                
                if (!products || products.length === 0) {
                    container.style.display = 'none';
                    if (noResults) noResults.style.display = 'block';
                    if (productsCount) productsCount.textContent = '0 products found';
                    return;
                }
                
                container.style.display = 'grid';
                if (noResults) noResults.style.display = 'none';
                if (productsCount) productsCount.textContent = `${products.length} product${products.length !== 1 ? 's' : ''} found`;
                
                container.innerHTML = products.map(product => {
                    const productData = productsData[product.id];
                    let previewImage = '';
                    
                    if (productData && productData.variants && productData.variants.length > 0) {
                        const firstVariant = productData.variants[0];
                        previewImage = getProductImageUrl(product.name, firstVariant.name);
                    } else {
                        previewImage = getProductImageUrl(product.name, null);
                    }
                    
                    const hasVariants = product.hasVariants;
                    const variantBadge = hasVariants ? `<span class="variant-badge">${product.variantCount} options available</span>` : '';
                    
                    // Stock status
                    const stock = product.available_stock || 0;
                    let stockStatus = '';
                    let stockClass = '';
                    if (stock > 5) {
                        stockStatus = 'In Stock';
                        stockClass = 'in-stock';
                    } else if (stock > 0) {
                        stockStatus = `Low Stock (${stock} left)`;
                        stockClass = 'low-stock';
                    } else {
                        stockStatus = 'Out of Stock';
                        stockClass = 'out-of-stock';
                    }
                    
                    return `
                    <div class="product-card" data-id="${product.id}">
                        <div class="product-image">
                            <img src="${previewImage}" 
                                 alt="${product.name}"
                                 loading="lazy"
                                 onerror="this.src='https://via.placeholder.com/300x200?text=${encodeURIComponent(product.name)}'">
                        </div>
                        <div class="product-info">
                            ${variantBadge}
                            <div class="product-brand">${escapeHtml(product.category)}</div>
                            <h3 class="product-title">${escapeHtml(product.name)}</h3>
                            <div class="stock-status ${stockClass}">
                                <i class="fas ${stock > 0 ? 'fa-check-circle' : 'fa-times-circle'}"></i>
                                ${stockStatus}
                            </div>
                            <div class="product-price">Starting from $${parseFloat(product.base_price).toFixed(2)}</div>
                            <button class="add-to-cart" onclick="openVariantModal(${product.id})" ${stock === 0 ? 'disabled' : ''}>
                                ${stock === 0 ? 'Out of Stock' : (hasVariants ? 'Choose Options' : 'Add to Cart')}
                            </button>
                        </div>
                    </div>
                `}).join('');
            }
            
            window.openVariantModal = async function(productId) {
                const product = productsData[productId];
                if (!product) return;
                
                currentModalProduct = product;
                currentModalVariants = product.variants || [];
                
                document.getElementById('modal-product-name').textContent = product.name;
                document.getElementById('modal-product-description').textContent = product.description || 'Premium quality car accessory';
                
                const variantSelect = document.getElementById('variant-select');
                variantSelect.innerHTML = '<option value="">Choose an option...</option>';
                
                if (currentModalVariants.length > 0) {
                    // Get stock for each variant
                    for (const variant of currentModalVariants) {
                        const stock = await getVariantStock(variant.id);
                        variant.available_stock = stock;
                        
                        const option = document.createElement('option');
                        option.value = variant.id;
                        option.setAttribute('data-price', variant.price);
                        option.setAttribute('data-name', variant.name);
                        option.setAttribute('data-type', variant.type);
                        option.setAttribute('data-stock', stock);
                        option.textContent = `${variant.name} (${variant.type}) - $${parseFloat(variant.price).toFixed(2)} ${stock === 0 ? ' - OUT OF STOCK' : ''}`;
                        option.disabled = stock === 0;
                        variantSelect.appendChild(option);
                    }
                    
                    // Select first available variant
                    const firstAvailable = currentModalVariants.find(v => v.available_stock > 0);
                    if (firstAvailable) {
                        variantSelect.value = firstAvailable.id;
                        updateVariantInfo(firstAvailable);
                    } else {
                        document.getElementById('modal-product-price').textContent = 'Out of Stock';
                        document.getElementById('modal-add-to-cart').disabled = true;
                    }
                } else {
                    // No variants - show base product
                    document.getElementById('modal-product-price').textContent = `$${parseFloat(product.base_price).toFixed(2)}`;
                    document.getElementById('modal-add-to-cart').disabled = false;
                    
                    const imageUrl = getProductImageUrl(product.name, null);
                    const modalImage = document.getElementById('modal-product-image');
                    if (imageUrl && !imageUrl.includes('placeholder')) {
                        modalImage.src = imageUrl;
                        modalImage.style.display = 'block';
                        modalImage.onerror = function() {
                            this.src = `https://via.placeholder.com/300x200?text=${encodeURIComponent(product.name)}`;
                        };
                    } else {
                        modalImage.style.display = 'none';
                    }
                }
                
                // Update variant info on change
                variantSelect.onchange = function() {
                    const selected = variantSelect.options[variantSelect.selectedIndex];
                    if (selected && selected.value) {
                        const variantId = parseInt(selected.value);
                        const variant = currentModalVariants.find(v => v.id === variantId);
                        if (variant) {
                            updateVariantInfo(variant);
                        }
                    }
                };
                
                document.getElementById('modal-quantity').value = 1;
                document.getElementById('variant-modal').style.display = 'flex';
            };
            
            function updateVariantInfo(variant) {
                document.getElementById('modal-product-price').textContent = `$${parseFloat(variant.price).toFixed(2)}`;
                document.getElementById('modal-add-to-cart').disabled = variant.available_stock === 0;
                
                const imageUrl = getProductImageUrl(currentModalProduct.name, variant.name);
                const modalImage = document.getElementById('modal-product-image');
                if (imageUrl && !imageUrl.includes('placeholder')) {
                    modalImage.src = imageUrl;
                    modalImage.style.display = 'block';
                    modalImage.onerror = function() {
                        this.src = `https://via.placeholder.com/300x200?text=${encodeURIComponent(currentModalProduct.name)}`;
                    };
                } else {
                    modalImage.style.display = 'none';
                }
            }
            
            async function addSelectedToCart() {
                const variantSelect = document.getElementById('variant-select');
                const selectedOption = variantSelect.options[variantSelect.selectedIndex];
                const quantity = parseInt(document.getElementById('modal-quantity').value) || 1;
                
                let productId = currentModalProduct.id;
                let variantId = null;
                let price = currentModalProduct.base_price;
                let variantName = null;
                let variantType = null;
                
                if (currentModalVariants.length > 0) {
                    if (!selectedOption || !selectedOption.value) {
                        showNotification('Please select an option', true);
                        return;
                    }
                    
                    variantId = parseInt(selectedOption.value);
                    variantName = selectedOption.getAttribute('data-name');
                    variantType = selectedOption.getAttribute('data-type');
                    price = parseFloat(selectedOption.getAttribute('data-price'));
                    
                    // Check stock again
                    const stock = await getVariantStock(variantId);
                    if (stock < quantity) {
                        showNotification('Not enough stock available', true);
                        return;
                    }
                }
                
                // Reserve stock
                const reserved = await reserveStock(productId, variantId, quantity);
                if (!reserved) {
                    showNotification('Failed to reserve stock. Please try again.', true);
                    return;
                }
                
                // Add to local cart
                let cart = getCart();
                const cartItem = {
                    id: variantId ? `${productId}_${variantId}` : productId.toString(),
                    product_id: productId,
                    variant_id: variantId,
                    name: variantName ? `${variantName} ${currentModalProduct.name}` : currentModalProduct.name,
                    product_name: currentModalProduct.name,
                    variant_name: variantName,
                    variant_type: variantType,
                    price: price,
                    quantity: quantity,
                    image: getProductImageUrl(currentModalProduct.name, variantName)
                };
                
                const existingItem = cart.find(item => item.id === cartItem.id);
                if (existingItem) {
                    existingItem.quantity += quantity;
                } else {
                    cart.push(cartItem);
                }
                
                saveCart(cart);
                showNotification(`${cartItem.name} added to cart!`);
                updateCartCount();
                closeModal();
                
                // Refresh product list to update stock display
                await fetchProducts();
            }
            
            // Cleanup expired reservations periodically
            async function cleanupExpiredReservations() {
                try {
                    await _supabase.rpc('cleanup_expired_reservations');
                } catch (error) {
                    console.error('Error cleaning up reservations:', error);
                }
            }
            
            // Run cleanup every 5 minutes
            setInterval(cleanupExpiredReservations, 5 * 60 * 1000);
            
            // Update stock display in cart
            function updateCartCount() {
                const cart = getCart();
                const totalItems = cart.reduce((sum, item) => sum + (item.quantity || 1), 0);
                const cartCount = document.querySelector('.cart-count');
                if (cartCount) cartCount.textContent = totalItems;
            }
            
            function closeModal() {
                document.getElementById('variant-modal').style.display = 'none';
                currentModalProduct = null;
                currentModalVariants = [];
            }
            
            function showNotification(message, isError = false) {
                // ... (keep your existing notification function)
            }
            
            function escapeHtml(str) {
                if (!str) return '';
                return str.replace(/[&<>]/g, function(m) {
                    if (m === '&') return '&amp;';
                    if (m === '<') return '&lt;';
                    if (m === '>') return '&gt;';
                    return m;
                });
            }
            
            function showError(message) {
                const container = document.getElementById('all-products');
                if (container) {
                    container.innerHTML = `<div style="text-align: center; padding: 3rem; grid-column: 1/-1;">
                        <i class="fas fa-exclamation-triangle" style="font-size: 3rem; color: #e67e22;"></i>
                        <h3>${escapeHtml(message)}</h3>
                        <button onclick="location.reload()" class="btn btn-primary" style="margin-top: 1rem;">Try Again</button>
                    </div>`;
                }
                showLoading(false);
            }
            
            function showLoading(show) {
                const spinner = document.getElementById('loading-spinner');
                const container = document.getElementById('all-products');
                if (show) {
                    if (spinner) spinner.style.display = 'block';
                    if (container) container.style.display = 'none';
                } else {
                    if (spinner) spinner.style.display = 'none';
                    if (container) container.style.display = 'grid';
                }
            }
            
            function populateCategoryFilter() {
                // ... (keep your existing function)
            }
            
            function filterAndSortProducts() {
                // ... (keep your existing function)
            }
            
            // Initialize
            document.addEventListener('DOMContentLoaded', () => {
                fetchProducts();
                updateCartCount();
                
                document.querySelector('.modal-close').onclick = closeModal;
                window.onclick = function(event) {
                    const modal = document.getElementById('variant-modal');
                    if (event.target === modal) closeModal();
                };
                document.getElementById('modal-add-to-cart').onclick = addSelectedToCart;
                
                const categoryFilter = document.getElementById('category-filter');
                const sortFilter = document.getElementById('sort-filter');
                const searchInput = document.getElementById('search-input');
                
                if (categoryFilter) categoryFilter.addEventListener('change', filterAndSortProducts);
                if (sortFilter) sortFilter.addEventListener('change', filterAndSortProducts);
                if (searchInput) searchInput.addEventListener('input', filterAndSortProducts);
                
                const menuToggle = document.querySelector('.menu-toggle');
                const navMenu = document.querySelector('.nav-menu');
                if (menuToggle) {
                    menuToggle.addEventListener('click', () => navMenu.classList.toggle('active'));
                }
            });
        })();
    </script>
</body>
</html>
